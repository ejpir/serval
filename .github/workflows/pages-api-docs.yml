name: API Docs (GitHub Pages)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Download Zig toolchain
        run: |
          set -euxo pipefail
          curl -L "https://ziglang.org/builds/zig-x86_64-linux-0.16.0-dev.3153+d6f43caad.tar.xz" \
            -o "${RUNNER_TEMP}/zig-x86_64-linux-0.16.0-dev.3153+d6f43caad.tar.xz"
          tar -C "${RUNNER_TEMP}" -xf "${RUNNER_TEMP}/zig-x86_64-linux-0.16.0-dev.3153+d6f43caad.tar.xz"
          patch -p0 -d "${RUNNER_TEMP}" < integration/toolchains/zig-0.16.0-dev.3153+d6f43caad-uring.patch
          echo "${RUNNER_TEMP}/zig-x86_64-linux-0.16.0-dev.3153+d6f43caad" >> "${GITHUB_PATH}"

      - name: Generate API docs
        run: |
          set -euxo pipefail
          bash scripts/generate_module_api_docs.sh \
            --zig "${RUNNER_TEMP}/zig-x86_64-linux-0.16.0-dev.3153+d6f43caad/zig" \
            --output-dir "public"
          touch public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
