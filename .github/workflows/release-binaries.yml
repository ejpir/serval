name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig toolchain
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.3039+b490412cd

      - name: Patch Zig stdlib for io_uring fix
        run: |
          set -euxo pipefail
          ZIG_BIN="$(command -v zig)"
          ZIG_DIR="$(cd "$(dirname "${ZIG_BIN}")/.." && pwd)"

          if ! grep -q "fn posixConnectWithTimeout" "${ZIG_DIR}/lib/std/Io/Threaded.zig" || \
             ! grep -q "\\.netConnectIp = netConnectIp," "${ZIG_DIR}/lib/std/Io/Uring.zig"; then
            patch -p1 -d "${ZIG_DIR}" < integration/toolchains/zig-0.16.0-dev.3039+b490412cd-uring.patch
          fi

      - name: Build release binaries
        run: |
          set -euxo pipefail
          zig build -Doptimize=ReleaseFast

      - name: Package binaries
        id: package
        run: |
          set -euxo pipefail
          TAG="${GITHUB_REF_NAME:-manual}"
          ARCHIVE="serval-${TAG}-linux-x86_64.tar.gz"
          tar -C zig-out -czf "${ARCHIVE}" bin
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          echo "archive=${ARCHIVE}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
