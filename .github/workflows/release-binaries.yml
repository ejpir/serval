name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Zig toolchain
        run: |
          set -euxo pipefail
          curl -L "https://ziglang.org/builds/zig-x86_64-linux-0.16.0-dev.3039+b490412cd.tar.xz" \
            -o "${RUNNER_TEMP}/zig-x86_64-linux-0.16.0-dev.3039+b490412cd.tar.xz"
          tar -C "${RUNNER_TEMP}" -xf "${RUNNER_TEMP}/zig-x86_64-linux-0.16.0-dev.3039+b490412cd.tar.xz"
          echo "${RUNNER_TEMP}/zig-x86_64-linux-0.16.0-dev.3039+b490412cd" >> "${GITHUB_PATH}"

      - name: Build release binaries
        run: |
          set -euxo pipefail
          zig build -Doptimize=ReleaseFast

      - name: Package binaries
        id: package
        run: |
          set -euxo pipefail
          TAG="${GITHUB_REF_NAME:-manual}"
          ARCHIVE="serval-${TAG}-linux-x86_64.tar.gz"
          tar -C zig-out -czf "${ARCHIVE}" bin
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          echo "archive=${ARCHIVE}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
