name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go (for hey)
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Install curl, hey, and HTTP/2 conformance tools
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y curl nghttp2-client
          go install github.com/rakyll/hey@v0.1.4
          go install github.com/summerwind/h2spec/cmd/h2spec@v2.2.1+incompatible
          go install github.com/fullstorydev/grpcurl/cmd/grpcurl@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install upstream Zig for smoke CI
        run: |
          set -euxo pipefail
          curl -L "https://ziglang.org/builds/zig-x86_64-linux-0.16.0-dev.2821+3edaef9e0.tar.xz" -o zig.tar.xz
          tar -xf zig.tar.xz
          echo "$GITHUB_WORKSPACE/zig-x86_64-linux-0.16.0-dev.2821+3edaef9e0" >> "$GITHUB_PATH"

      - name: Show Zig version
        run: zig version

      - name: Build
        run: zig build

      - name: Run integration tests
        run: zig build test-integration

      - name: Run HTTP/2 conformance gate (h2c + TLS)
        run: integration/h2_conformance_ci.sh --h2spec-timeout 1
