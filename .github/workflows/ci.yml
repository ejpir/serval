name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Zig toolchain archive for Docker build
        run: |
          set -euxo pipefail
          curl -L "https://ziglang.org/builds/zig-x86_64-linux-0.16.0-dev.3039+b490412cd.tar.xz" \
            -o "${RUNNER_TEMP}/zig-x86_64-linux-0.16.0-dev.3039+b490412cd.tar.xz"

      - name: Show Docker runtime
        run: |
          set -euxo pipefail
          docker info --format '{{json .SecurityOptions}}'

      - name: Run build, integration, and conformance gates in Docker
        env:
          SERVAL_CUSTOM_ZIG_ARCHIVE: ${{ runner.temp }}/zig-x86_64-linux-0.16.0-dev.3039+b490412cd.tar.xz
        run: |
          set -euxo pipefail
          bash integration/run_in_docker.sh
